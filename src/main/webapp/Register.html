<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録画面</title>
    <link rel="stylesheet" href="./css/Register.css">
</head>
<body>
<div id="container">
    <!-- カレンダーへ戻る -->
    <button id="backToCalendar">カレンダー表示</button>

    <!-- 日付表示 -->
    <h1 id="dateTitle"></h1>
    <p class="YMD"></p>

    <!-- 入力フォーム -->
    <div class="form-section">

        <div class="form-row">
            <label>登録内容</label>
            <input type="text" id="contents">
        </div>

        <div class="form-row">
            <label>金額</label>
            <input type="number" id="price">
        </div>

        <div class="form-row">
            <label>支出/収入</label>
            <div class="radio-group">
                <label><input type="radio" name="type" value="支出" id="spending" checked>支出</label>
                <label><input type="radio" name="type" value="収入" id="income">収入</label>
            </div>
        </div>

        <div class="form-row">
            <label>カテゴリー</label>
            <select id="category"></select>
        </div>

        <div class="form-row">
            <label>備考</label>
            <input type="text" id="remarks">
        </div>

        <div class="Register">
            <button id="insertBtn">登録</button>
        </div>

        <h3>カテゴリ管理</h3>
        <div class="form-row">
            <label>カテゴリ追加</label>
            <input type="text" id="categoryAdd">
            <button id="addCategoryBtn">追加</button>
        </div>

        <div class="form-row">
            <label>カテゴリ削除</label>
            <select id="categoryDelete"></select>
            <button id="deleteCategoryBtn">削除</button>
        </div>
    </div>


    <!-- 一覧表示 -->
    <div class="Reference">
        <h2>登録一覧</h2>

        <table id="recordTable">
            <tr>
                <th>内容</th>
                <th>金額</th>
                <th>収入/支出</th>
                <th>カテゴリ</th>
                <th>備考</th>
                <th>日付</th>   <!-- ★これを追加 -->
                <th>操作</th>
            </tr>
        </table>
    </div>

    <!-- 前日・翌日 -->
    <div class="DayNavigation">
        <button id="prevDay">前日</button>
        <button id="nextDay">翌日</button>
    </div>
    <script src="./js/Register.js"></script>
</div>
</body>
</html>
