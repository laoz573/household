<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>登録画面（API版）</title>
    <link rel="stylesheet" href="./css/Register.css">
</head>
<body>

<h1 id="dateTitle"></h1>

<!-- 前日・翌日ボタン -->
<div>
    <button id="prevDay">前日</button>
    <button id="nextDay">翌日</button>
</div>

<!-- 登録フォーム -->
<div class="form">
    <h2>新規登録</h2>

    <label>内容：</label>
    <input type="text" id="contents"><br>

    <label>金額：</label>
    <input type="number" id="price"><br>

    <label>収入：</label>
    <input type="radio" name="type" value="収入" id="income">
    <label for="income">収入</label>

    <label>支出：</label>
    <input type="radio" name="type" value="支出" id="spending">
    <label for="spending">支出</label>
    <br>

    <label>カテゴリ：</label>
    <select id="category">
        <option value="食費">食費</option>
        <option value="日用品">日用品</option>
        <option value="交通費">交通費</option>
        <option value="交際費">交際費</option>
        <option value="その他">その他</option>
    </select><br>

    <label>備考：</label>
    <input type="text" id="remarks"><br>

    <button id="insertBtn">登録</button>
</div>

<hr>

<!-- 一覧表示 -->
<h2>登録一覧</h2>
<table border="1" id="recordTable">
    <tr>
        <th>ID</th>
        <th>内容</th>
        <th>金額</th>
        <th>収入/支出</th>
        <th>カテゴリ</th>
        <th>備考</th>
        <th>操作</th>
    </tr>
</table>

<script>
    // sessionStorage から取得
    let year = parseInt(sessionStorage.getItem("year"));
    let month = parseInt(sessionStorage.getItem("month"));
    let date = parseInt(sessionStorage.getItem("date"));

    // 値がない場合（直接アクセスされた場合）
    if (!year || !month || !date) {
        alert("日付情報がありません。カレンダーから遷移してください。");
    }

    // 日付タイトル
    function updateTitle() {
        document.getElementById("dateTitle").textContent =
            `${year}年${month}月${date}日の登録`;
    }

    updateTitle();

    // -----------------------------
    // ① 指定日のデータ取得（GET）
    // -----------------------------
    function loadRecords() {
        fetch(`/api/record?year=${year}&month=${month}&date=${date}`)
            .then(res => res.json())
            .then(list => {
                const table = document.getElementById("recordTable");

                // ヘッダー以外を削除
                table.querySelectorAll("tr:not(:first-child)").forEach(tr => tr.remove());

                list.forEach(r => {
                    const tr = document.createElement("tr");

                    tr.innerHTML = `
                        <td>${r.id}</td>
                        <td><input value="${r.contents}" id="c${r.id}"></td>
                        <td><input value="${r.price}" id="p${r.id}" type="number"></td>
                        <td>
                            <select id="t${r.id}">
                                <option value="収入" ${r.income === "収入" ? "selected" : ""}>収入</option>
                                <option value="支出" ${r.spending === "支出" ? "selected" : ""}>支出</option>
                            </select>
                        </td>
                        <td><input value="${r.category}" id="cat${r.id}"></td>
                        <td><input value="${r.remarks}" id="rm${r.id}"></td>
                        <td>
                            <button onclick="updateRecord(${r.id})">更新</button>
                            <button onclick="deleteRecord(${r.id})">削除</button>
                        </td>
                    `;

                    table.appendChild(tr);
                });
            });
    }

    loadRecords();

    // -----------------------------
    // ② 新規登録（POST）
    // -----------------------------
    document.getElementById("insertBtn").onclick = () => {
        const type = document.querySelector("input[name='type']:checked");

        const data = {
            year: year,
            month: month,
            date: date,
            contents: document.getElementById("contents").value,
            price: parseInt(document.getElementById("price").value),
            income: type && type.value === "収入" ? "収入" : "",
            spending: type && type.value === "支出" ? "支出" : "",
            category: document.getElementById("category").value,
            remarks: document.getElementById("remarks").value
        };

        fetch("/api/record", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        }).then(() => {
            alert("登録しました");
            loadRecords();
        });
    };

    // -----------------------------
    // ③ 更新（PUT）
    // -----------------------------
    function updateRecord(id) {
        const data = {
            id: id,
            year: year,
            month: month,
            date: date,
            contents: document.getElementById("c" + id).value,
            price: parseInt(document.getElementById("p" + id).value),
            income: document.getElementById("t" + id).value === "収入" ? "収入" : "",
            spending: document.getElementById("t" + id).value === "支出" ? "支出" : "",
            category: document.getElementById("cat" + id).value,
            remarks: document.getElementById("rm" + id).value
        };

        fetch("/api/record", {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        }).then(() => {
            alert("更新しました");
            loadRecords();
        });
    }

    // -----------------------------
    // ④ 削除（DELETE）
    // -----------------------------
    function deleteRecord(id) {
        fetch(`/api/record?id=${id}`, { method: "DELETE" })
            .then(() => {
                alert("削除しました");
                loadRecords();
            });
    }

    // -----------------------------
    // ⑤ 前日・翌日
    // -----------------------------
    document.getElementById("prevDay").onclick = () => {
        const d = new Date(year, month - 1, date - 1);
        year = d.getFullYear();
        month = d.getMonth() + 1;
        date = d.getDate();
        updateTitle();
        loadRecords();
    };

    document.getElementById("nextDay").onclick = () => {
        const d = new Date(year, month - 1, date + 1);
        year = d.getFullYear();
        month = d.getMonth() + 1;
        date = d.getDate();
        updateTitle();
        loadRecords();
    };
</script>

</body>
</html>
