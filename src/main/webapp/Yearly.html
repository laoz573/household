<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>年間料金</title>
  <link rel="stylesheet" href="./css/Yearly.css">
</head>
<body>

<div class="container">

  <!-- ログアウト -->
<button onclick="location.href='Login.html'">ログイン画面</button>

  <h1>年間料金</h1>

  <!-- 年月選択 -->
  <table class="selectYearMonth">
    <tr>
      <th>年間収入</th>
      <th>年間支出</th>
      <th>年選択</th>
      <th>月選択</th>
      <th>操作</th>
    </tr>
    <tr>
      <td id="yearlyIncome">0円</td>
      <td id="yearlySpending">0円</td>

      <td>
        <select id="yearInput"></select>
      </td>

      <td>
        <select id="monthInput">
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </td>

      <td>
        <button id="goCalendar">表示</button>
      </td>
    </tr>
  </table>

  <!-- グラフ -->
  <div class="graph-container">
    <canvas id="monthlyFinanceChart"></canvas>
    <canvas id="categoryPieChart"></canvas>
  </div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<h2>新規ユーザー登録</h2>

  <form id="registerForm">
    <label>ユーザー名:</label>
    <input type="text" id="regUser" required><br>

    <label>パスワード:</label>
    <input type="password" id="regPass" required><br>

    <button type="button" id="registerBtn">新規登録</button>
  </form>

<script src="./js/Yearly.js"></script>

</div>
</body>
</html>
