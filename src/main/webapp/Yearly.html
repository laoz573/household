<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿（API版）</title>
  <link rel="stylesheet" href="./css/Yearly.css">
</head>
<body>

<div class="container">

  <!-- ログアウト -->
  <form action="LoginFilter" method="POST">
    <input type="hidden" name="action" value="logout">
    <button type="submit">ログイン画面</button>
  </form>

  <h1>家計簿</h1>
  <h2>年間料金</h2>

  <!-- 年月選択 -->
  <table class="selectYearMonth">
    <tr>
      <th>年間収入</th>
      <th>年間支出</th>
      <th>年選択</th>
      <th>月選択</th>
      <th>操作</th>
    </tr>
    <tr>
      <td id="yearlyIncome">0円</td>
      <td id="yearlySpending">0円</td>

      <td>
        <select id="yearInput"></select>
      </td>

      <td>
        <select id="monthInput">
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </td>

      <td>
        <button id="goCalendar">表示</button>
      </td>
    </tr>
  </table>

  <!-- グラフ -->
  <div class="graph-container">
    <canvas id="monthlyFinanceChart"></canvas>
    <canvas id="categoryPieChart"></canvas>
  </div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <script>
    // -----------------------------
    // 初期設定
    // -----------------------------
    const now = new Date();
    let currentYear = now.getFullYear();
    let currentMonth = now.getMonth() + 1;

    const yearSelect = document.getElementById("yearInput");
    const monthSelect = document.getElementById("monthInput");

    // 年選択肢を生成
    for (let y = 2023; y <= currentYear + 10; y++) {
      const opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y + "年";
      if (y === currentYear) opt.selected = true;
      yearSelect.appendChild(opt);
    }

    monthSelect.value = currentMonth;

    // -----------------------------
    // API① 年間収支取得
    // -----------------------------
    function loadYearly() {
      const year = parseInt(yearSelect.value);

      fetch(`/api/yearly?year=${year}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById("yearlyIncome").textContent =
            data.yearlyTotalIncome + "円";
          document.getElementById("yearlySpending").textContent =
            data.yearlyTotalSpending + "円";

          drawBarChart(data.monthlyTotalIncomes, data.monthlyTotalSpendings);
        });
    }

    // -----------------------------
    // API② カテゴリ別支出取得
    // -----------------------------
    function loadCategory() {
      const year = parseInt(yearSelect.value);
      const month = parseInt(monthSelect.value);

      fetch(`/api/yearly/category?year=${year}&month=${month}`)
        .then(res => res.json())
        .then(data => {
          const labels = Object.keys(data.categories);
          const values = Object.values(data.categories);

          drawPieChart(labels, values);
        });
    }

    // -----------------------------
    // 棒グラフ描画
    // -----------------------------
    let barChart;
    function drawBarChart(incomes, spendings) {
      const ctx = document.getElementById("monthlyFinanceChart").getContext("2d");

      if (barChart) barChart.destroy();

      barChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"],
          datasets: [
            {
              label: "収入",
              data: incomes,
              backgroundColor: "rgba(54, 162, 235, 0.2)",
              borderColor: "rgba(54, 162, 235, 1)",
              borderWidth: 1
            },
            {
              label: "支出",
              data: spendings,
              backgroundColor: "rgba(255, 99, 132, 0.2)",
              borderColor: "rgba(255, 99, 132, 1)",
              borderWidth: 1
            }
          ]
        },
        options: {
          responsive: true,
          scales: {
            y: { beginAtZero: true }
          }
        }
      });
    }

    // -----------------------------
    // 円グラフ描画
    // -----------------------------
    let pieChart;
    function drawPieChart(labels, values) {
      const ctx = document.getElementById("categoryPieChart").getContext("2d");

      if (pieChart) pieChart.destroy();

      pieChart = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: labels.length ? labels : ["データなし"],
          datasets: [{
            data: values.length ? values : [0],
            backgroundColor: [
              "rgba(255, 99, 132, 0.6)",
              "rgba(54, 162, 235, 0.6)",
              "rgba(255, 206, 86, 0.6)",
              "rgba(75, 192, 192, 0.6)",
              "rgba(153, 102, 255, 0.6)"
            ]
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: "bottom" },
            datalabels: {
              color: "#000",
              formatter: (value, ctx) => {
                const label = ctx.chart.data.labels[ctx.dataIndex];
                return label + "\n¥" + value.toLocaleString();
              }
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    // -----------------------------
    // カレンダーへ遷移
    // -----------------------------
    document.getElementById("goCalendar").onclick = () => {
      window.location.href = "Calendar.html";
    };

    // -----------------------------
    // 初回ロード
    // -----------------------------
    loadYearly();
    loadCategory();

    // 年 or 月が変わったら再取得
    yearSelect.onchange = () => {
      loadYearly();
      loadCategory();
    };
    monthSelect.onchange = () => {
      loadCategory();
    };
  </script>

</div>
</body>
</html>
